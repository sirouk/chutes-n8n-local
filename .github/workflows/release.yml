name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag override (default: git tag or sha)"
        required: false

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  N8N_NODES_CHUTES_REPO: sirouk/n8n-nodes-chutes
  N8N_NODES_CHUTES_REF: d98eb1c02e966a99eb0c8ce66434feaa2c9049c3

jobs:
  ci:
    name: CI
    uses: ./.github/workflows/ci.yml

  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: ci

    steps:
      - name: Checkout chutes-n8n-local
        uses: actions/checkout@v6

      - name: Checkout n8n-nodes-chutes
        uses: actions/checkout@v6
        with:
          repository: ${{ env.N8N_NODES_CHUTES_REPO }}
          ref: ${{ env.N8N_NODES_CHUTES_REF }}
          path: _n8n-nodes-chutes

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Prepare n8n-nodes-chutes build context
        run: |
          mkdir -p build/n8n-nodes-chutes
          rsync -a --delete \
            --exclude node_modules \
            --exclude .git \
            --exclude tests \
            --exclude coverage \
            _n8n-nodes-chutes/ build/n8n-nodes-chutes/
          node scripts/patch-n8n-nodes-chutes.mjs build/n8n-nodes-chutes

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=
            type=raw,value=latest,enable=${{ github.event_name == 'release' }}
            type=raw,value=${{ inputs.tag }},enable=${{ inputs.tag != '' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.n8n
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
